<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Feira Virtual</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style_global.css">
    <link rel="stylesheet" href="./perfil.css">

    <script src="../header.js" defer></script>
    <script src="./perfil.js" defer></script>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="../index.html" class="logo">
                <img src="../assets/image_logo.jpeg" alt="Logo Feira Virtual">
                <div class="logo-text">
                    <h1>Feira Virtual</h1>
                    <p>Alimentos Frescos</p>
                </div>
            </a>
            
            <nav class="icons" aria-label="Navegação de atalhos">
                <a href="#" class="icon-link" title="Meu Perfil" id="link-conta">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </a>
                <a href="../carrinho/carrinho.html" class="icon-link" title="Carrinho">
                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </a>
            </nav>
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar-perfil">
            <div class="foto-perfil-placeholder">
                <span id="inicial-usuario">?</span>
            </div>
            <h3 id="sidebar-nome">Carregando...</h3>
            
            <nav class="menu-perfil">
                <button class="menu-btn ativo">Meus Dados</button>
                <button class="menu-btn" onclick="window.location.href='../carrinho/carrinho.html'">Minha Cesta</button>
                <div class="config">
                    <button class="logout-btn" id="btn-sair-perfil">Sair da Conta</button>
                </div>
            </nav>
        </aside>

        <main class="content-perfil">
            <div class="boas-vindas">
                <h2>Olá, <span id="painel-nome" style="color: #a36b3e;">Usuário</span>!</h2>
                <p>Bem-vindo ao seu painel de controle da Feira Virtual.</p>
            </div>

            <div class="cards-informativos">
                <div class="info-card">
                    <h4>Seus Dados Cadastrais</h4>
                    <hr>
                    <p><strong>Nome:</strong> <span id="info-nome">...</span></p>
                    <p><strong>E-mail:</strong> <span id="info-email">...</span></p>
                    <p><strong>Senha:</strong> ********</p>
                </div>

                <div class="info-card">
                    <h4>Status da Cesta Atual</h4>
                    <hr>
                    <p id="info-cesta">Verificando itens...</p>
                    <a href="../carrinho/carrinho.html" class="link-acao">Ir para o carrinho</a>
                </div>
            </div>
        </main>
    </div>

    </body>
</html>
