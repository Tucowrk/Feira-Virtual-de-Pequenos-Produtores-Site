<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Vitrine - Feira Virtual</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style_global.css">
    <link rel="stylesheet" href="./hortifruti.css">

    <script src="../header.js" defer></script>
    <script src="./hortifruti.js" defer></script>
</head>

<body>

    <header>
        <div class="container header-content">
            <a href="../index.html" class="logo">
                <img src="../assets/image_logo.jpeg" alt="Logo Feira Virtual">
                <div class="logo-text">
                    <h1>Feira Virtual</h1>
                    <p>Alimentos Frescos</p>
                </div>
            </a>
            
            <nav class="icons" aria-label="Navegação de atalhos">
                <a href="../Acesse a sua conta/Acesseasuaconta.html" class="icon-link" title="Acesse sua conta" id="link-conta">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </a>
            
                <a href="https://maps.google.com" target="_blank" class="icon-link" title="Localização">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </a>

                <a href="../carrinho/carrinho.html" class="icon-link" title="Carrinho">
                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </a>
            </nav>
        </div>
    </header>

    <main class="main-layout container">
        <section class="vitrine-area">
            <div class="barra-filtros">
                <input type="text" id="campo-busca" placeholder="O que você procura?" class="campo-busca">

                <select class="select-categoria" id="filtroCategoria">
                    <option value="Todos">Todas as categorias</option>
                    <option value="Hortifruti" selected>Hortifruti</option>
                    <option value="Mercearia">Mercearia</option>
                    <option value="Artesanato">Artesanato</option>
                </select>

                <select class="select-ordenar" id="ordenarPreco">
                    <option value="relevancia">Relevância</option>
                    <option value="menor">Menor preço</option>
                    <option value="maior">Maior preço</option>
                </select>
            </div>

            <div id="vitrine-produtos" class="cards-produtos">
                </div>
        </section>

        <aside class="sidebar-carrinho">
            <div class="carrinho-fixed">
                <h3>Minha Cesta</h3>
                <div id="mini-lista-carrinho" class="mini-lista">
                    </div>
                <div class="resumo-mini">
                    <div class="total-row">
                        <span>Total:</span>
                        <strong id="total-mini">R$ 0,00</strong>
                    </div>
                    <a href="../carrinho/carrinho.html" class="btn-checkout">Finalizar Compra</a>
                </div>
            </div>
        </aside>
    </main>

    </body>
</html>
